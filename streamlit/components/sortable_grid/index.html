<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      padding: 2px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      border-left: 4px solid;
      cursor: grab;
      user-select: none;
      transition: box-shadow 0.15s, transform 0.1s;
      min-height: 52px;
    }
    .card:active  { cursor: grabbing; }
    .card:hover   { box-shadow: 0 3px 10px rgba(0,0,0,0.13); transform: translateY(-1px); }

    .sortable-ghost  { opacity: 0.35; transform: scale(0.97); }
    .sortable-chosen { box-shadow: 0 6px 18px rgba(0,0,0,0.18); z-index: 100; }

    .badge {
      width: 22px; height: 22px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: white;
      flex-shrink: 0;
    }

    .card-title {
      font-size: 12.5px; font-weight: 600; color: #111827;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.35;
    }

    /* Tooltip sovraimpressione */
    .tooltip {
      display: none;
      position: absolute;
      bottom: calc(100% + 8px);
      left: 0; right: 0;
      min-width: 180px;
      background: rgba(17,24,39,0.93);
      color: #F9FAFB;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11.5px;
      line-height: 1.45;
      z-index: 9999;
      pointer-events: none;
      word-break: break-word;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .tooltip::after {
      content: '';
      position: absolute;
      top: 100%; left: 16px;
      border: 5px solid transparent;
      border-top-color: rgba(17,24,39,0.93);
    }
    .card:hover .tooltip { display: block; }

    .hint {
      text-align: center;
      color: #9CA3AF;
      font-size: 10.5px;
      margin-top: 8px;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>
  <div id="grid" class="grid"></div>
  <p class="hint">☰ &nbsp;trascina le carte per riordinare</p>

  <script>
    // ── Streamlit component protocol (inline) ──────────────
    (function () {
      var _handler = null;
      window.Streamlit = {
        RENDER_EVENT: "streamlit:render",
        events: {
          addEventListener: function (t, h) {
            if (t === "streamlit:render") _handler = h;
          }
        },
        setComponentReady: function () {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:componentReady", apiVersion: 1 }, "*"
          );
        },
        setComponentValue: function (v) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: v, dataType: "json" }, "*"
          );
        },
        setFrameHeight: function (h) {
          window.parent.postMessage(
            { isStreamlitMessage: true, type: "streamlit:setFrameHeight",
              height: h !== undefined ? h : document.body.scrollHeight }, "*"
          );
        }
      };
      window.addEventListener("message", function (e) {
        if (e.data.type === "streamlit:render" && _handler) {
          _handler({ detail: e.data });
        }
      });
    })();

    // ── Palette colori per fascia di posizione ─────────────
    var COLORS = [
      { border: "#7C3AED", bg: "#F5F3FF", badge: "#7C3AED" }, // viola  — top 25%
      { border: "#2563EB", bg: "#EFF6FF", badge: "#2563EB" }, // blu    — 25-50%
      { border: "#0D9488", bg: "#ECFDF5", badge: "#0D9488" }, // teal   — 50-75%
      { border: "#9CA3AF", bg: "#F9FAFB", badge: "#9CA3AF" }, // grigio — bottom 25%
    ];

    function colorTier(pos, total) {
      var p = pos / total;
      if (p < 0.25) return COLORS[0];
      if (p < 0.50) return COLORS[1];
      if (p < 0.75) return COLORS[2];
      return COLORS[3];
    }

    function esc(s) {
      return String(s)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;")
        .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    function setsEqual(a, b) {
      if (a.size !== b.size) return false;
      for (var x of a) if (!b.has(x)) return false;
      return true;
    }

    // ── Stato interno ──────────────────────────────────────
    var itemsMap    = {};   // testo → descrizione
    var currentOrder = null;
    var sortable    = null;
    var initialized = false;

    function renderGrid(order) {
      var grid  = document.getElementById("grid");
      grid.innerHTML = "";
      var total = order.length;

      order.forEach(function (testo, i) {
        var c    = colorTier(i, total);
        var desc = itemsMap[testo] || "";
        var card = document.createElement("div");
        card.className = "card";
        card.dataset.id = testo;
        card.style.borderLeftColor  = c.border;
        card.style.backgroundColor  = c.bg;
        card.innerHTML =
          '<div class="badge" style="background:' + c.badge + '">' + (i + 1) + "</div>" +
          '<div class="card-title">' + esc(testo) + "</div>" +
          (desc ? '<div class="tooltip">' + esc(desc) + "</div>" : "");
        grid.appendChild(card);
      });

      if (sortable) sortable.destroy();
      sortable = Sortable.create(grid, {
        animation: 140,
        ghostClass: "sortable-ghost",
        chosenClass: "sortable-chosen",
        onEnd: function () {
          var newOrder = Array.from(grid.querySelectorAll(".card"))
            .map(function (c) { return c.dataset.id; });
          currentOrder = newOrder;
          updateColors();
          Streamlit.setComponentValue(newOrder);
        }
      });
    }

    function updateColors() {
      var cards = Array.from(document.querySelectorAll(".card"));
      var total = cards.length;
      cards.forEach(function (card, i) {
        var c = colorTier(i, total);
        card.style.borderLeftColor = c.border;
        card.style.backgroundColor = c.bg;
        card.querySelector(".badge").style.background = c.badge;
        card.querySelector(".badge").textContent = i + 1;
      });
    }

    // ── Render handler ─────────────────────────────────────
    function onRender(event) {
      var items = event.detail.args.items || [];

      // Aggiorna la mappa testo→descrizione
      itemsMap = {};
      items.forEach(function (it) { itemsMap[it.testo] = it.descrizione || ""; });

      if (!initialized) {
        currentOrder = items.map(function (it) { return it.testo; });
        renderGrid(currentOrder);
        initialized = true;
      } else {
        var newSet = new Set(items.map(function (it) { return it.testo; }));
        var curSet = new Set(currentOrder);
        if (!setsEqual(newSet, curSet)) {
          // Fenomeni aggiunti o rimossi → reinizializza con il nuovo ordine
          currentOrder = items.map(function (it) { return it.testo; });
          renderGrid(currentOrder);
        }
        // Stessi fenomeni → mantieni lo stato del drag, aggiorna solo colori (es. dopo rerun)
      }

      Streamlit.setFrameHeight(document.body.scrollHeight + 10);
    }

    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
    Streamlit.setComponentReady();
  </script>
</body>
</html>
